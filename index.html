<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Heart Galaxy</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas Container -->
    <canvas id="webglCanvas"></canvas>

    <!-- CDN Libraries: Three.js & GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const canvas = document.getElementById('webglCanvas');
        const scene = new THREE.Scene();
        
        // Add subtle cosmic fog for depth
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 45;

        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true,
            alpha: false
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1.0);

        // Core Configuration & Particle Count
        const particleCount = 8500;
        let currentMode = 'gather'; // 'scatter' (running around) or 'gather' (assembled heart)
        let scatterTimeout = null;

        // Interactive mouse tracking
        const mouse = {
            x: 0,
            y: 0,
            targetX: 0,
            targetY: 0
        };

        // Programmatically creates a premium red glowing soft circle texture
        function createGlowTexture() {
            const size = 64;
            const canvasTexture = document.createElement('canvas');
            canvasTexture.width = size;
            canvasTexture.height = size;
            const ctx = canvasTexture.getContext('2d');

            // Draw radial glow matching a passionate, pure red glowing color profile
            const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            gradient.addColorStop(0, 'rgba(255, 230, 235, 1)'); // Blazing white-hot core
            gradient.addColorStop(0.15, 'rgba(255, 30, 70, 0.95)'); // Inner hot red
            gradient.addColorStop(0.4, 'rgba(230, 10, 40, 0.5)');   // Deep glowing scarlet
            gradient.addColorStop(0.8, 'rgba(100, 0, 15, 0.15)');   // Ambient dark ruby shadow
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');           // Complete transparency

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            return new THREE.CanvasTexture(canvasTexture);
        }

        const particleTexture = createGlowTexture();

        // Parametric 3D Heart formula coordinates
        function getHeartPoint(t, phi) {
            const scale = 1.15;
            const x = 16 * Math.pow(Math.sin(t), 3) * scale;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            
            // Generate volumetric thickness on Z axis
            const thickness = 0.2 + 0.8 * Math.sin(t);
            const z = Math.sin(phi) * 5 * thickness * scale;

            return new THREE.Vector3(x, y - 2, z);
        }

        const geometry = new THREE.BufferGeometry();
        
        // Float32Arrays for Three.js geometry attributes
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const particlesData = [];

        // Radiant and passionate red romantic color palette
        const romancePalette = [
            new THREE.Color(0xff003c), // Radiant bright red
            new THREE.Color(0xff1a40), // Intense rose red
            new THREE.Color(0xcc0029), // Crimson red
            new THREE.Color(0xff4d6d), // Bright glowing pinkish red
            new THREE.Color(0xe60000)  // Solid pure red
        ];

        for (let i = 0; i < particleCount; i++) {
            const t = (i / particleCount) * Math.PI * 2;
            const phi = Math.random() * Math.PI * 2;
            
            // Core heart target position
            const heartTarget = getHeartPoint(t, phi);
            
            // Add delicate organic noise offsets to give natural dust look
            const noiseX = (Math.random() - 0.5) * 1.5;
            const noiseY = (Math.random() - 0.5) * 1.5;
            const noiseZ = (Math.random() - 0.5) * 1.5;
            heartTarget.add(new THREE.Vector3(noiseX, noiseY, noiseZ));

            // Initial chaotic positions scattered in space
            const startX = (Math.random() - 0.5) * 120;
            const startY = (Math.random() - 0.5) * 120;
            const startZ = (Math.random() - 0.5) * 120;

            positions[i * 3] = startX;
            positions[i * 3 + 1] = startY;
            positions[i * 3 + 2] = startZ;

            // Load colors into buffer
            const pColor = romancePalette[Math.floor(Math.random() * romancePalette.length)];
            colors[i * 3] = pColor.r;
            colors[i * 3 + 1] = pColor.g;
            colors[i * 3 + 2] = pColor.b;

            // Setup particle movement physics and swirling behaviors
            particlesData.push({
                currentPos: new THREE.Vector3(startX, startY, startZ),
                heartPos: heartTarget,
                velocity: new THREE.Vector3(0, 0, 0),
                
                // Spiral orbit parameters when particles "run wild"
                orbitRadius: Math.random() * 26 + 8,
                orbitSpeed: (0.012 + Math.random() * 0.022) * (Math.random() > 0.5 ? 1 : -1),
                orbitAngle: Math.random() * Math.PI * 2,
                orbitHeight: (Math.random() - 0.5) * 38,

                // Smooth attraction and kinetic dragging
                attractionFactor: 0.035 + Math.random() * 0.055,
                drag: 0.85 + Math.random() * 0.05
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Create Materials using Premium Additive Blending
        const material = new THREE.PointsMaterial({
            size: 1.15,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: true
        });

        // Add particles to scene
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Gentle rotation sway on the Y-axis (Matching image_bc9a06.png pattern)
        gsap.fromTo(particleSystem.rotation, 
            { y: -0.22 }, 
            { 
                y: 0.22, 
                repeat: -1, 
                yoyo: true, 
                ease: "power1.inOut", 
                duration: 4.8 
            }
        );

        // Gentle breathing motion up and down
        gsap.fromTo(particleSystem.position,
            { y: -0.6 },
            {
                y: 0.6,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut",
                duration: 3.2
            }
        );

        // Control function to alternate particle modes
        function setMode(mode) {
            currentMode = mode;
            
            if (mode === 'scatter') {
                // Randomize orbit properties dynamically for chaotic spiral flow
                particlesData.forEach(p => {
                    p.orbitAngle = Math.atan2(p.currentPos.y, p.currentPos.x) + (Math.random() - 0.5) * 3;
                    p.orbitRadius = Math.random() * 26 + 6;
                    p.orbitSpeed = (0.016 + Math.random() * 0.024) * (Math.random() > 0.5 ? 1 : -1);
                });
            }
        }

        // Function to run wild, then re-gather automatically
        function triggerTransition() {
            setMode('scatter');
            
            if (scatterTimeout) clearTimeout(scatterTimeout);
            
            // Gather back automatically after 3.8 seconds
            scatterTimeout = setTimeout(() => {
                setMode('gather');
            }, 3800);
        }

        // Tap/click screen to trigger scatter-then-gather sequence
        window.addEventListener('mousedown', triggerTransition);
        window.addEventListener('touchstart', (e) => {
            triggerTransition();
        }, { passive: true });

        // Responsive cursor / tilt reaction
        window.addEventListener('mousemove', (e) => {
            mouse.targetX = ((e.clientX - window.innerWidth / 2) / (window.innerWidth / 2)) * 0.45;
            mouse.targetY = -((e.clientY - window.innerHeight / 2) / (window.innerHeight / 2)) * 0.45;
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                mouse.targetX = ((touch.clientX - window.innerWidth / 2) / (window.innerWidth / 2)) * 0.45;
                mouse.targetY = -((touch.clientY - window.innerHeight / 2) / (window.innerHeight / 2)) * 0.45;
            }
        }, { passive: true });

        // Maintain full responsiveness
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Parallax camera easing
            mouse.x += (mouse.targetX - mouse.x) * 0.08;
            mouse.y += (mouse.targetY - mouse.y) * 0.08;
            scene.rotation.y = mouse.x;
            scene.rotation.x = mouse.y;

            // Heartbeat rhythmic pulsing behavior (lub-dub)
            const lub = Math.sin(time * 3.6) * 0.5 + 0.5;
            const dub = Math.sin(time * 7.2) * 0.25 + 0.25;
            const pulseScale = 1.0 + (Math.max(0, lub) * 0.065) + (Math.max(0, dub) * 0.03);

            // Update particle geometry positions array
            const positionsAttr = geometry.attributes.position.array;

            for (let i = 0; i < particleCount; i++) {
                const p = particlesData[i];

                if (currentMode === 'scatter') {
                    // RUN WILD STATE: Spiral orbital swarming pattern
                    p.orbitAngle += p.orbitSpeed;
                    
                    let targetX = Math.cos(p.orbitAngle) * p.orbitRadius;
                    let targetZ = Math.sin(p.orbitAngle) * p.orbitRadius;
                    let targetY = p.orbitHeight;

                    const diffX = targetX - p.currentPos.x;
                    const diffY = targetY - p.currentPos.y;
                    const diffZ = targetZ - p.currentPos.z;

                    p.velocity.x += diffX * 0.016;
                    p.velocity.y += diffY * 0.016;
                    p.velocity.z += diffZ * 0.016;
                } else {
                    // GATHER STATE: Pull together into the beating 3D heart structure
                    const heartPosScaled = p.heartPos.clone().multiplyScalar(pulseScale);
                    
                    const diffX = heartPosScaled.x - p.currentPos.x;
                    const diffY = heartPosScaled.y - p.currentPos.y;
                    const diffZ = heartPosScaled.z - p.currentPos.z;

                    p.velocity.x += diffX * p.attractionFactor;
                    p.velocity.y += diffY * p.attractionFactor;
                    p.velocity.z += diffZ * p.attractionFactor;
                }

                // Apply drag friction to keep simulation smooth and organic
                p.velocity.multiplyScalar(p.drag);
                p.currentPos.add(p.velocity);

                // Update position attributes
                positionsAttr[i * 3] = p.currentPos.x;
                positionsAttr[i * 3 + 1] = p.currentPos.y;
                positionsAttr[i * 3 + 2] = p.currentPos.z;
            }

            // Flag WebGL buffer updates
            geometry.attributes.position.needsUpdate = true;

            // Render single frame pass
            renderer.render(scene, camera);
        }

        // Initialize animation loop
        window.onload = function() {
            setTimeout(() => {
                setMode('gather');
            }, 300);
            animate();
        };
    </script>
</body>
</html>
